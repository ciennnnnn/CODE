<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRAPICO — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="base.css?v=20260510c" />
  <link rel="stylesheet" href="login.css?v=20260510c" />
  <style>
    .reset-wrap { width: min(100%, 420px); }
    .reset-note { color: #636a72; font-size: 13px; line-height: 1.5; margin-bottom: 10px; }
    .reset-status { margin-top: 10px; font-size: 13px; line-height: 1.45; }
    .reset-status.error { color: #aa2222; }
    .reset-status.success { color: #0b6b3a; }
    .reset-actions { display: flex; gap: 10px; margin-top: 12px; }
    .reset-actions .login-submit { margin-top: 0; }
  </style>
</head>
<body data-role="regular">

<div class="login-page">
  <section class="login-left">
    <div class="login-left-inner">
      <div class="login-badge">TTMD • QUEZON CITY</div>
      <h1 class="login-title">TRAPICO.</h1>
      <p class="login-sub">Set your new account password securely. This reset link expires in 30 minutes for your protection.</p>
    </div>
  </section>

  <section class="login-right">
    <div class="login-panel reset-wrap">
      <h2 class="login-form-title">RESET PASSWORD</h2>
      <div class="login-form">
        <p class="reset-note">Enter your new password. You are not required to provide your old password for this recovery flow.</p>

        <div class="form-group login-field-group">
          <label class="login-label" for="reset-new">NEW PASSWORD</label>
          <div class="password-wrap">
            <input id="reset-new" class="login-input login-input-password" type="password" placeholder="Min. 8 chars, 1 uppercase, 1 number" autocomplete="new-password" />
            <button type="button" class="password-toggle" id="toggle-new" aria-label="Show password">◔</button>
          </div>
        </div>

        <div class="form-group login-field-group">
          <label class="login-label" for="reset-confirm">CONFIRM NEW PASSWORD</label>
          <div class="password-wrap">
            <input id="reset-confirm" class="login-input login-input-password" type="password" placeholder="Repeat new password" autocomplete="new-password" />
            <button type="button" class="password-toggle" id="toggle-confirm" aria-label="Show password">◔</button>
          </div>
        </div>

        <div class="reset-actions">
          <button class="login-submit" id="reset-btn" type="button">UPDATE PASSWORD</button>
        </div>
        <div class="reset-status" id="reset-status" aria-live="polite"></div>
      </div>
    </div>
  </section>
</div>

<script src="api.js?v=20260510c"></script>
<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const token = (params.get('token') || '').trim();
    const role = (params.get('role') || '').trim();
    const statusEl = document.getElementById('reset-status');
    const btn = document.getElementById('reset-btn');
    const newInput = document.getElementById('reset-new');
    const confirmInput = document.getElementById('reset-confirm');

    function showStatus(msg, isError) {
      statusEl.textContent = msg;
      statusEl.className = 'reset-status ' + (isError ? 'error' : 'success');
    }

    function toggle(inputId, buttonId) {
      const input = document.getElementById(inputId);
      const btnEl = document.getElementById(buttonId);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btnEl.textContent = showing ? '◔' : '◕';
      btnEl.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
    }

    document.getElementById('toggle-new').addEventListener('click', function () { toggle('reset-new', 'toggle-new'); });
    document.getElementById('toggle-confirm').addEventListener('click', function () { toggle('reset-confirm', 'toggle-confirm'); });

    if (!token) {
      showStatus('Missing reset token. Please request a new reset link.', true);
      btn.disabled = true;
      return;
    }

    apiFetch('password_reset.php', { action: 'validateToken', token, role }, 'POST')
      .then(function () {
        showStatus('Reset link verified. You can now set a new password.', false);
      })
      .catch(function (error) {
        showStatus(error.message || 'This reset link is invalid or expired.', true);
        btn.disabled = true;
      });

    btn.addEventListener('click', async function () {
      const nw = (newInput.value || '').trim();
      const cf = (confirmInput.value || '').trim();

      if (!nw || !cf) {
        showStatus('Please complete both password fields.', true);
        return;
      }
      if (nw !== cf) {
        showStatus('Passwords do not match.', true);
        return;
      }
      if (nw.length < 8 || !/[A-Z]/.test(nw) || !/\d/.test(nw)) {
        showStatus('Password must be at least 8 characters with 1 uppercase letter and 1 number.', true);
        return;
      }

      btn.disabled = true;
      btn.textContent = 'UPDATING...';
      try {
        const resp = await apiFetch('password_reset.php', {
          action: 'resetPassword',
          token,
          role,
          newPassword: nw,
        }, 'POST');

        const roleTag = (resp && resp.updatedRole) ? (' Role: ' + resp.updatedRole + '.') : '';
        showStatus((resp.message || 'Password reset successful. Redirecting to sign in...') + roleTag, false);
        const loginMap = {
          regular: 'citizen-login.html',
          dispatch: 'dispatch-login.html',
          field: 'field-login.html',
        };
        setTimeout(function () {
          window.location.href = loginMap[role] || 'index.html';
        }, 1200);
      } catch (error) {
        showStatus(error.message || 'Unable to reset password right now.', true);
        btn.disabled = false;
        btn.textContent = 'UPDATE PASSWORD';
      }
    });
  })();
</script>
</body>
</html>
